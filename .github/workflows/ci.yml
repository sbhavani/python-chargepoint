name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - run: uv sync --all-extras

      - name: black
        run: uv run black --check nightcharge/ tests/

      - name: flake8
        run: uv run flake8 nightcharge/ tests/

      - name: mypy
        run: uv run mypy nightcharge/

      - name: pyright
        run: uv run pyright nightcharge/

      - name: pip-audit
        run: uv run pip-audit --strict --ignore-vuln CVE-2026-4539 --skip-editable

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - run: uv sync --all-extras

      - name: pytest
        run: uv run pytest --cov=nightcharge --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
