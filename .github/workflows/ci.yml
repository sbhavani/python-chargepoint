name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - run: uv sync --dev
        env:
          UV_LINK_MODE: copy

      - name: black
        run: uv run black --check nightcharge/ tests/

      - name: flake8
        run: uv run flake8 nightcharge/ tests/

      - name: mypy
        run: uv run mypy nightcharge/

      - name: pyright
        run: uv run pyright nightcharge/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - run: uv sync --dev
        env:
          UV_LINK_MODE: copy

      - name: pytest
        run: uv run pytest --cov=nightcharge --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage
          path: coverage.xml
