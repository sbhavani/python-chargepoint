name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - run: uv sync --dev

      - name: black
        run: .venv/bin/black --check nightcharge/ tests/

      - name: flake8
        run: .venv/bin/flake8 nightcharge/ tests/

      - name: mypy
        run: .venv/bin/mypy nightcharge/

      - name: pyright
        run: .venv/bin/pyright nightcharge/

      - name: pip-audit
        run: .venv/bin/pip-audit --strict --ignore-vuln CVE-2026-4539 --skip-editable

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - run: uv sync --dev

      - name: pytest
        run: .venv/bin/pytest --cov=nightcharge --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
