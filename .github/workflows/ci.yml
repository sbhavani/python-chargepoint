name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - run: uv sync --dev
        env:
          UV_LINK_MODE: copy

      - name: black
        run: uv tool run black --check nightcharge/ tests/

      - name: flake8
        run: uv tool run flake8 nightcharge/ tests/

      - name: mypy
        run: uv tool run mypy nightcharge/

      - name: pyright
        run: uv tool run pyright nightcharge/

      - name: pip-audit
        run: uv tool run pip-audit --strict --ignore-vuln CVE-2026-4539 --skip-editable

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - run: uv sync --dev
        env:
          UV_LINK_MODE: copy

      - name: pytest
        run: uv tool run pytest --cov=nightcharge --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
