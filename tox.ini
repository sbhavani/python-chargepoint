[tox]
envlist =
    py3
    black
    flake8
    mypy
    pyright
isolated_build = True

[tox:.package]
basepython = python3

[testenv]
commands =
    uv sync --dev
    uv run pytest {posargs}
allowlist_externals = uv

[testenv:black]
skip_install = true
allowlist_externals = uv
commands =
    uv sync --dev
    uv run black --check nightcharge/ tests/

[testenv:flake8]
skip_install = true
allowlist_externals = uv
commands =
    uv sync --dev
    uv run flake8 nightcharge/ tests/

[testenv:mypy]
skip_install = true
allowlist_externals = uv
commands =
    uv sync --dev
    uv run mypy nightcharge/

[testenv:pyright]
skip_install = true
allowlist_externals = uv
commands =
    uv sync --dev
    uv run pyright nightcharge/

[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --cov
    --cov-config=tox.ini
    --cov-report=term
    --cov-report=xml

[flake8]
# Match Black Formatter
max-line-length = 88
extend-ignore = E203, E501, W503

[coverage:run]
source = nightcharge
branch = True
omit = nightcharge/__main__.py

[coverage:report]
show_missing = True
fail_under = 90

